name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ticket-system/backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ticket-system/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ticket-system/backend/package-lock.json

      - name: Install dependencies with retry
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retry-mintimeout 20000
          for i in 1 2 3; do
            npm ci && break
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci failed (attempt $i), retrying in 15s..."
            sleep 15
          done
      - run: npx prisma generate
      - run: npm run build

      - name: Package for deployment
        run: |
          mkdir -p ../../deploy
          cp -r dist ../../deploy/
          cp package.json ../../deploy/
          cp -r prisma ../../deploy/prisma
          cd ../../deploy
          npm install --omit=dev
          npx prisma generate
          zip -r ../backend.zip .

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A41936EDE47248FDB344FCE518B4E215 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4FD21C9C42B4452AB4E39476E76760CD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6092945B90A1416DA54A488C84D44231 }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: gongdan
          package: backend.zip
