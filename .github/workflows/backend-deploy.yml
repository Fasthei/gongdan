name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ticket-system/backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ticket-system/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npx prisma generate
      - run: npm run build

      - name: Package for deployment
        run: |
          mkdir -p ../../deploy
          cp -r dist ../../deploy/
          cp package.json ../../deploy/
          cp -r prisma ../../deploy/prisma
          cd ../../deploy
          npm install --omit=dev
          npx prisma generate
          zip -r ../backend.zip .

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A41936EDE47248FDB344FCE518B4E215 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4FD21C9C42B4452AB4E39476E76760CD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6092945B90A1416DA54A488C84D44231 }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: gongdan
          package: backend.zip
