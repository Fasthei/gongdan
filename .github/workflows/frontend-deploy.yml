name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ticket-system/frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        working-directory: ticket-system/frontend
        env:
          VITE_API_BASE_URL: https://gongdan-b5fzbtgteqd5gzfb.eastasia-01.azurewebsites.net
        run: |
          npm install
          npm run build

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A41936EDE47248FDB344FCE518B4E215 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4FD21C9C42B4452AB4E39476E76760CD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6092945B90A1416DA54A488C84D44231 }}

      - name: Deploy to Azure Static Web Apps
        run: |
          az staticwebapp deploy \
            --name gongdan \
            --resource-group gongdan \
            --app-location ticket-system/frontend/dist \
            --no-build
