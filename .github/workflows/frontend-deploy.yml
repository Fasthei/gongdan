name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ticket-system/frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ticket-system/frontend/package-lock.json

      - name: Build
        working-directory: ticket-system/frontend
        run: |
          npm ci
          npm run build

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ticket-system/frontend/dist
          skip_app_build: true
