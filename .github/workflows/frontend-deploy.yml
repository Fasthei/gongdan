name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ticket-system/frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        working-directory: ticket-system/frontend
        env:
          VITE_API_BASE_URL: https://gongdan-b5fzbtgteqd5gzfb.eastasia-01.azurewebsites.net
        run: |
          npm install
          npm run build

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ticket-system/frontend/dist
          skip_app_build: true
