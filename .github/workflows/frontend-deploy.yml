name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ticket-system/frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        working-directory: ticket-system/frontend
        run: |
          npm install
          npm run build

      - name: Install SWA CLI and Deploy
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_SWA_TOKEN }}
        run: |
          npm install -g @azure/static-web-apps-cli
          swa deploy ticket-system/frontend/dist --env production
